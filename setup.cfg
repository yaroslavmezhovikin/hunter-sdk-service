[flake8]
dictionaries = en_US,python,technical,django
ignore = W503,WPS226,WPS227,WPS235,WPS473,WPS601,DAR101,DAR201,DAR301,DAR401
max-line-length = 120
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv
# S101 (bandit "use of assert") is the pytest idiom — disabling it for
# test code only; production code in `src/` remains fully strict.
per-file-ignores =
    tests/*.py: S101

[pycodestyle]
max-line-length = 120
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv

[mypy]
python_version = 3.11
allow_redefinition = False
check_untyped_defs = True
disallow_untyped_defs = True
ignore_errors = False
ignore_missing_imports = True
implicit_reexport = False
local_partial_types = True
no_implicit_optional = True
no_implicit_reexport = True
show_error_codes = True
strict_equality = True
strict_optional = True
warn_redundant_casts = True
warn_unreachable = True
warn_unused_configs = True
warn_unused_ignores = True
plugins = pydantic.mypy

[mypy-*.migrations.*]
# Alembic migrations should not produce any errors:
ignore_errors = True

[coverage:run]
omit = *migrations*, *tests*

[isort]
line_length = 120
include_trailing_comma = True
use_parentheses = True
multi_line_output = 3
