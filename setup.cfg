[flake8]
dictionaries = en_US,python,technical,django
# WPS214 — service/SDK classes legitimately expose 8 methods (lifecycle + 3 endpoints + helpers).
# WPS404 — FastAPI dependency injection requires ``Depends(...)`` as a default value.
ignore = W503,WPS214,WPS226,WPS227,WPS235,WPS404,WPS473,WPS601,DAR101,DAR201,DAR301,DAR401
max-line-length = 120
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv,alembic
# Test code legitimately uses HTTP status codes / scores as literals,
# fixture-heavy locals and underscored-number test names (e.g. test_..._404).
per-file-ignores =
    tests/*: S101,WPS114,WPS118,WPS210,WPS218,WPS219,WPS226,WPS432,WPS442

[pycodestyle]
max-line-length = 120
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv,alembic

[mypy]
python_version = 3.11
allow_redefinition = False
check_untyped_defs = True
disallow_untyped_defs = True
ignore_errors = False
ignore_missing_imports = True
implicit_reexport = False
local_partial_types = True
no_implicit_optional = True
no_implicit_reexport = True
show_error_codes = True
strict_equality = True
strict_optional = True
warn_redundant_casts = True
warn_unreachable = True
warn_unused_configs = True
warn_unused_ignores = True
plugins = pydantic.mypy

[coverage:run]
omit = *migrations*, *tests*

[isort]
line_length = 120
include_trailing_comma = True
use_parentheses = True
multi_line_output = 3
